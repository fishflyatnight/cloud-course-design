name: Build, Push, and Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/cicd.yml"

permissions:
  contents: read

env:
  SWR_REGISTRY: swr.cn-north-4.myhuaweicloud.com
  SWR_ORG: cloud_course
  NAMESPACE: cloud-course

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set immutable image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Log in to SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ secrets.SWR_USERNAME }}
          password: ${{ secrets.SWR_PASSWORD }}

      - name: Build backend
        run: |
          docker build --provenance=false \
            -f backend/Dockerfile.backend \
            -t "$SWR_REGISTRY/$SWR_ORG/backend:$IMAGE_TAG" backend

      - name: Build frontend
        run: |
          docker build --provenance=false \
            -f frontend/Dockerfile.frontend \
            -t "$SWR_REGISTRY/$SWR_ORG/frontend:$IMAGE_TAG" frontend

      - name: Push images
        run: |
          docker push "$SWR_REGISTRY/$SWR_ORG/backend:$IMAGE_TAG"
          docker push "$SWR_REGISTRY/$SWR_ORG/frontend:$IMAGE_TAG"

      - name: Configure kubectl
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBECONFIG_B64 }}' | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy immutable images
        run: |
          kubectl -n "$NAMESPACE" set image deployment/backend \
            backend="$SWR_REGISTRY/$SWR_ORG/backend:$IMAGE_TAG"
          kubectl -n "$NAMESPACE" set image deployment/frontend \
            frontend="$SWR_REGISTRY/$SWR_ORG/frontend:$IMAGE_TAG"
          kubectl -n "$NAMESPACE" rollout status deployment/backend --timeout=5m
          kubectl -n "$NAMESPACE" rollout status deployment/frontend --timeout=5m

      - name: Verify deployed tags
        run: |
          kubectl -n "$NAMESPACE" get deployment backend frontend \
            -o custom-columns=NAME:.metadata.name,IMAGE:.spec.template.spec.containers[0].image

