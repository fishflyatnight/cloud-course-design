apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-wordcount
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "swr.cn-north-4.myhuaweicloud.com/cloud_course/spark:v1"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work/wordcount.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: "512m"
    memoryOverhead: "128m"
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 2
    memory: "1g"
    memoryOverhead: "128m"
