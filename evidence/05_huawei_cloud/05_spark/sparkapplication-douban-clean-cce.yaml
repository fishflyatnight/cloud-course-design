apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: douban-clean-cce
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/cloud_course/spark:v1
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work/clean_douban.py
  arguments:
    - --input
    - /opt/spark/work/data/douban_movies.csv
    - --output
    - /tmp/douban-cleaned
    - --format
    - parquet
  sparkVersion: "3.4.3"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: "1g"
    memoryOverhead: "256m"
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 1
    memory: "1g"
    memoryOverhead: "256m"
