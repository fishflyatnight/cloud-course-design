apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-course-bonus-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cloud-course-bonus.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "max": 100,
              "min": 0,
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "legend": {"displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Node CPU Utilization",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "continuous-GrYlRd"},
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {"h": 11, "w": 24, "x": 0, "y": 10},
          "id": 2,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 16,
            "minVizWidth": 8,
            "orientation": "horizontal",
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "editorMode": "code",
              "expr": "topk(15, sum by (namespace, pod) (container_memory_working_set_bytes{container!=\"\", image!=\"\"}))",
              "instant": true,
              "legendFormat": "{{namespace}} / {{pod}}",
              "range": false,
              "refId": "A"
            }
          ],
          "title": "Top Pod Memory Working Set",
          "type": "bargauge"
        }
      ],
      "refresh": "15s",
      "schemaVersion": 42,
      "tags": ["cloud-course", "bonus"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timezone": "browser",
      "title": "Cloud Course Bonus Monitoring",
      "uid": "cloud-course-bonus",
      "version": 1
    }
